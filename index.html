<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <!-- Tell browsers not to scale the viewport automatically -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paperback Society - Home</title>
    <link rel="icon" href="favicon.ico" />

    <link rel="stylesheet" href="main.css" />

    <!-- Include bootstrap CSS framework -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
    crossorigin="anonymous"
    />

</head>
<body class="bg-dark text-light">
<header class="container-fluid">
    <nav class="navbar fixed-top navbar-dark">
        <a class="navbar-brand" href="#">Paperback Society</a>
        <menu class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link active" href="index.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="forum.html">Forum</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="profile.html">Profile</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="about.html">About</a>
            </li>
        </menu>
    </nav>
</header>

<main class="container-fluid bg-secondary text-center" style="background-image: url(https://live.staticflickr.com/1739/41084771040_a6e44573c0_b.jpg); background-repeat: no-repeat; background-size: cover;">
    <div class="bg-secondary rounded p-3" style="--bs-bg-opacity: .6;">
        <h1>Welcome</h1>
        <p>Login to access forum</p>
        <form method="get" action="forum.html">
            <div class="form-group p-3">
                <label for="name">Username</label>
                <input type="text" id="name" class="form-control" placeholder="username" />
            </div>
            <div class="form-group p-3">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="password">
            </div>
            <button type="submit" class="btn btn-dark">Login</button>
        </form>
    </div>
</main>

<footer class="bg-dark text-white-50">
    <div class="container-fluid">
    <span class="text-reset">Brett Horman</span>
    <a class="text-reset" href="https://github.com/bchorman/startup">GitHub</a>
    </div>
</footer>
</body>
</html>
